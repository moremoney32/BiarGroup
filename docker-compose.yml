version: '3.9'

# ══════════════════════════════════════════════════════════════════
#  BIAR GROUP AFRICA — Actor Hub CPaaS
#  Orchestration complète : frontend + backend + mysql + redis
#
#  Usage :
#    docker-compose up -d          → démarrage complet
#    docker-compose up -d backend  → backend seul
#    docker-compose logs -f        → logs en direct
#    docker-compose down           → arrêt
# ══════════════════════════════════════════════════════════════════

services:

  # ── Frontend (React → build statique servi par Nginx) ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biar_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - biar_net

  # ── Backend (Node.js / Express) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biar_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file: ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
      - uploads_data:/app/public/uploads
    networks:
      - biar_net

  # ── MySQL 8 ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: biar_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_NAME:-biar_cpaas}
      MYSQL_USER: ${DB_USER:-biar_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-biar_pass}
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biar_net

  # ── Redis 7 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: biar_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biar_net

volumes:
  mysql_data:
  redis_data:
  uploads_data:

networks:
  biar_net:
    driver: bridge
